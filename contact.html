<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Contact Us</h1>
    </header>
    <section>
        <form action="#" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            
            <label for="phone">Phone:</label>
            <input type="tel" id="phone" name="phone" required>
            
            <label for="company">Company:</label>
            <input type="text" id="company" name="company">
            
            <label for="service">Service:</label>
            <select id="service" name="service">
                <option value="web-development">Web Development</option>
                <option value="graphic-design">Graphic Design</option>
                <option value="seo-services">SEO Services</option>
                <option value="content-creation">Content Creation</option>
            </select>
            
            <label for="budget">Budget Range:</label>
            <select id="budget" name="budget">
                <option value="under-1000">Under $1,000</option>
                <option value="1000-5000">$1,000 - $5,000</option>
                <option value="5000-10000">$5,000 - $10,000</option>
                <option value="over-10000">Over $10,000</option>
            </select>
            
            <label for="details">Project Details:</label>
            <textarea id="details" name="details" required></textarea>
            
            <button type="submit">Send Message</button>
        </form>
    </section>
    <section>
        <h2>Contact Information</h2>
        <p>Phone Numbers:</p>
        <ul>
            <li><a href="mailto:mubayidenver@gmail.com">mubayidenver@gmail.com</a></li>
            <li><a href="mailto:denyvites@gmail.com">denyvites@gmail.com</a></li>
            <li><a href="mailto:lordvites@gmail.com">lordvites@gmail.com</a></li>
        </ul>
    </section>
    <section>
        <h2>FAQ</h2>
        <p>Here you can add your FAQ content.</p>
    </section>
</body>
</html>
